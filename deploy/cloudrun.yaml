apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: equityiq
  labels:
    cloud.googleapis.com/location: asia-south1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "4"
        run.googleapis.com/request-timeout: "300"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      containers:
        - image: asia-south1-docker.pkg.dev/PROJECT_ID/equityiq/equityiq:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "1Gi"
              cpu: "1"
          env:
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_API_KEY
                  key: latest
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: POLYGON_API_KEY
                  key: latest
            - name: FRED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: FRED_API_KEY
                  key: latest
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: NEWS_API_KEY
                  key: latest
            - name: SERPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: SERPER_API_KEY
                  key: latest
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: TAVILY_API_KEY
                  key: latest
            - name: ENVIRONMENT
              value: production
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
